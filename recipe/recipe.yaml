schema_version: 1

context:
  name: stats_arrays
  version: "2.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/stats_arrays-${{ version }}.tar.gz
  sha256: b1adda2c7e60cea20866050fe5b2f23a625535d03d07835dd0c521a152e8fd27

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools >=68.0
  run:
    - python >=${{ python_min }}
    - numpy
    - scipy

tests:
  - python:
      imports:
        - stats_arrays
      pip_check: true
      python_version: ${{ python_min }}

about:
  summary: Standard NumPy array interface for defining uncertain parameters
  license: BSD-3-Clause
  license_file: LICENSE
  homepage: https://github.com/brightway-lca/stats_arrays
  repository: https://github.com/brightway-lca/stats_arrays
  documentation: http://stats-arrays.readthedocs.io/en/latest/

extra:
  recipe-maintainers:
    - cmutel
    - xylar
